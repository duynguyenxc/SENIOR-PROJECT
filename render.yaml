# Render.com deployment config
# Deploys the web service as a Docker container with env vars for DB and Stripe
services:
  - type: web
    name: veg-buffet-web
    runtime: docker
    rootDir: web
    plan: free
    healthCheckPath: /
    envVars:
      - key: APP_URL
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_SSL_CA_PATH
        value: /etc/ssl/certs/ca-certificates.crt
      - key: DB_SSL_VERIFY_SERVER_CERT
        value: "true"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
